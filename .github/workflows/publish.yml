name: Publish

on:
  pull_request_target:
    types:
      - closed

concurrency: ${{ github.workflow }}-${{ github.ref }}
permissions: {}
jobs:
  publish:
    if: github.repository == 'hack-dance/island-ai' && github.event.pull_request.merged == true && (startsWith(github.head_ref, 'changeset-release/main') || startsWith(github.head_ref, '_publish-trigger'))
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    name: Publish packages
    runs-on: ubuntu-latest
    environment: Publish
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_REMOTE_ONLY: true
    

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Publish packages & create release
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun publish-packages
          createGithubReleases: true

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
