name: Test Main

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run-live-tests:
        description: Run credentialed provider integration tests
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test-main:
    if: github.repository == 'hack-dance/island-ai' && github.ref == 'refs/heads/main'
    name: run-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - run: bun run build
      - run: bun run type-check
      - run: bun run lint
      - run: bun test --timeout=25000

  test-live:
    if: github.repository == 'hack-dance/island-ai' && inputs.run-live-tests
    name: run-live-provider-tests
    runs-on: ubuntu-latest
    environment: OPENAI
    steps:
      - uses: actions/checkout@v7

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run live provider integration tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RUN_LIVE_TESTS: "1"
        run: |
          missing=0
          for name in ANTHROPIC_API_KEY GEMINI_API_KEY GROQ_API_KEY OPENAI_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required live-test secret: $name"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]
          bun test --timeout=25000
