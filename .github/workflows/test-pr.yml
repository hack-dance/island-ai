
name: Test PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-branch:
    name: run-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - run: bun run build
      - run: bun run type-check
      - run: bun run lint
      - run: bun test --timeout=25000
